<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FlixFree · Watch Instantly</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0b0b0f;
      font-family: 'Segoe UI', sans-serif;
      color: white;
    }

    .navbar {
      display: flex;
      justify-content: space-between;
      padding: 1rem 4%;
      background: #000;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      font-size: 1.8rem;
      font-weight: 800;
      color: #e50914;
    }

    .nav-links {
      display: flex;
      gap: 2rem;
    }

    .nav-links a {
      color: white;
      text-decoration: none;
    }

    .hero {
      height: 70vh;
      display: flex;
      align-items: center;
      padding: 0 6%;
      background: linear-gradient(rgba(0,0,0,.7), rgba(0,0,0,.5)),
        url('https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?w=1600') center/cover;
    }

    .hero-content h1 {
      font-size: 3rem;
    }

    .watch-btn {
      margin-top: 1rem;
      background: #e50914;
      border: none;
      color: white;
      padding: 0.8rem 1.5rem;
      cursor: pointer;
      border-radius: 6px;
      font-size: 1rem;
    }

    .row {
      padding: 2rem 4%;
    }

    .row h2 {
      margin-bottom: 1rem;
    }

    .slider {
      display: flex;
      gap: 1rem;
      overflow-x: auto;
    }

    .card {
      min-width: 220px;
      background: #1a1a24;
      border-radius: 10px;
      overflow: hidden;
      cursor: pointer;
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.03);
    }

    .card img {
      width: 100%;
      height: 300px;
      object-fit: cover;
    }

    .card-info {
      padding: 1rem;
    }

    .badge {
      margin-top: 0.5rem;
      display: inline-block;
      background: #e50914;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.7rem;
    }

    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.95);
      z-index: 1000;
      justify-content: center;
      align-items: center;
    }

    .modal-content {
      width: 90%;
      max-width: 900px;
      background: #111;
      border-radius: 16px;
      overflow: hidden;
      position: relative;
    }

    .video-container {
      aspect-ratio: 16 / 9;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    .close-modal {
      position: absolute;
      top: 10px;
      right: 15px;
      font-size: 2rem;
      cursor: pointer;
      z-index: 1001;
    }

    .modal-info {
      padding: 1rem;
    }
  </style>
</head>
<body>

<header>
  <div class="navbar">
    <div class="logo">FLIXFREE</div>
    <div class="nav-links">
      <a href="#">Home</a>
      <a href="#">Movies</a>
      <a href="#">Series</a>
    </div>
  </div>
</header>

<div class="hero">
  <div class="hero-content">
    <h1>Unlimited free movies & series</h1>
    <button class="watch-btn" onclick="heroRandomPlay()">
      <i class="fas fa-play"></i> Watch Now
    </button>
  </div>
</div>

<main>
  <div class="row">
    <h2>Trending Now</h2>
    <div class="slider" id="trendingSlider"></div>
  </div>

  <div class="row">
    <h2>Top Movies</h2>
    <div class="slider" id="moviesSlider"></div>
  </div>

  <div class="row">
    <h2>Series</h2>
    <div class="slider" id="seriesSlider"></div>
  </div>
</main>

<div id="videoModal" class="modal">
  <div class="modal-content">
    <div class="close-modal" onclick="closeModal()">&times;</div>
    <div class="video-container">
      <iframe id="playerIframe" allowfullscreen></iframe>
    </div>
    <div class="modal-info">
      <h3 id="modalTitle"></h3>
      <p id="modalDesc"></p>
    </div>
  </div>
</div>

<script>
  const mediaLibrary = {
    trending: [
      {
        title: "The Midnight Gospel",
        year: "2020",
        type: "series",
        desc: "Animated existential journey.",
        embed: "https://player.vimeo.com/video/76979871"
      },
      {
        title: "The Big Lebowski",
        year: "1998",
        type: "movie",
        desc: "Classic cult comedy.",
        embed: "https://player.vimeo.com/video/22439234"
      }
    ],

    movies: [
      {
        title: "Sherlock Jr.",
        year: "1924",
        type: "movie",
        desc: "Buster Keaton masterpiece.",
        embed: "https://player.vimeo.com/video/1084537"
      },
      {
        title: "Kung Fury",
        year: "2015",
        type: "movie",
        desc: "Retro action film.",
        embed: "https://player.vimeo.com/video/22439234"
      }
    ],

    series: [
      {
        title: "Pilgrim",
        year: "2021",
        type: "series",
        desc: "Indie sci-fi web series.",
        embed: "https://player.vimeo.com/video/148751763"
      }
    ]
  };

  function renderCards(items, containerId) {
    const container = document.getElementById(containerId);
    container.innerHTML = "";

    items.forEach(item => {
      const card = document.createElement("div");
      card.className = "card";

      card.innerHTML = `
        <img src="https://via.placeholder.com/300x450/1a1a24/e50914?text=${encodeURIComponent(item.title)}">
        <div class="card-info">
          <h4>${item.title} (${item.year})</h4>
          <p>${item.type}</p>
          <div class="badge">FREE</div>
        </div>
      `;

      card.onclick = () => openModal(item);
      container.appendChild(card);
    });
  }

  function openModal(media) {
    document.getElementById("playerIframe").src = media.embed + "?autoplay=1";
    document.getElementById("modalTitle").innerText =
      `${media.title} (${media.year})`;
    document.getElementById("modalDesc").innerText = media.desc;

    document.getElementById("videoModal").style.display = "flex";
    document.body.style.overflow = "hidden";
  }

  function closeModal() {
    document.getElementById("playerIframe").src = "";
    document.getElementById("videoModal").style.display = "none";
    document.body.style.overflow = "auto";
  }

  function heroRandomPlay() {
    const allMedia = [
      ...mediaLibrary.trending,
      ...mediaLibrary.movies,
      ...mediaLibrary.series
    ];

    const random =
      allMedia[Math.floor(Math.random() * allMedia.length)];

    openModal(random);
  }

  renderCards(mediaLibrary.trending, "trendingSlider");
  renderCards(mediaLibrary.movies, "moviesSlider");
  renderCards(mediaLibrary.series, "seriesSlider");
</script>

</body>
</html>
