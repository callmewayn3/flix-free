<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FlixFree · Watch Instantly</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      background: #0b0b0f;
      font-family: 'Segoe UI', sans-serif;
      color: white;
    }

    .navbar {
      display: flex;
      justify-content: space-between;
      padding: 1rem 4%;
      background: #000;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      font-size: 1.8rem;
      font-weight: 800;
      color: #e50914;
    }

    .nav-links {
      display: flex;
      gap: 2rem;
    }

    .nav-links a {
      color: white;
      text-decoration: none;
    }

    .hero {
      height: 70vh;
      position: relative;
      display: flex;
      align-items: center;
      padding: 0 6%;
      overflow: hidden;
    }

    .hero-bg {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      opacity: 0;
      transition: opacity 1.5s ease-in-out;
    }

    .hero-bg.active {
      opacity: 1;
    }

    .hero::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(rgba(0,0,0,.75), rgba(0,0,0,.5));
      z-index: 1;
    }

    .hero-content {
      position: relative;
      z-index: 2;
      max-width: 600px;
    }

    .hero-content h1 {
      font-size: 3rem;
      margin-bottom: 1rem;
    }

    .hero-content p {
      font-size: 1.1rem;
      line-height: 1.6;
    }

    .watch-btn {
      margin-top: 1rem;
      background: #e50914;
      border: none;
      color: white;
      padding: 0.8rem 1.5rem;
      cursor: pointer;
      border-radius: 6px;
      font-size: 1rem;
    }

    .row {
      padding: 2rem 4%;
    }

    .row h2 {
      margin-bottom: 1rem;
    }

    .slider {
      display: flex;
      gap: 1rem;
      overflow-x: auto;
    }

    .card {
      min-width: 220px;
      background: #1a1a24;
      border-radius: 10px;
      overflow: hidden;
      cursor: pointer;
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.05);
    }

    .card img {
      width: 100%;
      height: 300px;
      object-fit: cover;
    }

    .card-info {
      padding: 1rem;
    }

    .badge {
      margin-top: 0.5rem;
      display: inline-block;
      background: #e50914;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.7rem;
    }

    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.95);
      z-index: 1000;
      justify-content: center;
      align-items: center;
    }

    .modal-content {
      width: 90%;
      max-width: 900px;
      background: #111;
      border-radius: 16px;
      overflow: hidden;
      position: relative;
    }

    .video-container {
      aspect-ratio: 16 / 9;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    .close-modal {
      position: absolute;
      top: 10px;
      right: 15px;
      font-size: 2rem;
      cursor: pointer;
      z-index: 1001;
    }

    .modal-info {
      padding: 1rem;
    }

    #feedback {
      padding: 2rem 4%;
      text-align: center;
    }

    #feedback a {
      font-size: 2rem;
      margin: 0 15px;
      color: white;
      transition: 0.3s;
    }

    #feedback a:hover {
      color: #e50914;
      transform: scale(1.2);
    }

    footer {
      text-align: center;
      padding: 2rem;
    }
  </style>
</head>

<body>

<header>
  <div class="navbar">
    <div class="logo">FLIXFREE</div>
    <div class="nav-links">
      <a href="#home">Home</a>
      <a href="#movies">Movies</a>
      <a href="#series">Series</a>
      <a href="#feedback">Feedback</a>
    </div>
  </div>
</header>

<div class="hero" id="home">
  <div class="hero-bg bg1 active"></div>
  <div class="hero-bg bg2"></div>

  <div class="hero-content">
    <h1 id="heroTitle"></h1>
    <p id="heroDesc"></p>
    <button class="watch-btn" onclick="playCurrentHero()">
      <i class="fas fa-play"></i> Watch Now
    </button>
  </div>
</div>

<main>
  <div class="row">
    <h2>Trending Now</h2>
    <div class="slider" id="trendingSlider"></div>
  </div>

  <div class="row" id="movies">
    <h2>Top Movies</h2>
    <div class="slider" id="moviesSlider"></div>
  </div>

  <div class="row" id="series">
    <h2>Series</h2>
    <div class="slider" id="seriesSlider"></div>
  </div>
</main>

<div id="videoModal" class="modal">
  <div class="modal-content">
    <div class="close-modal" onclick="closeModal()">&times;</div>
    <div class="video-container">
      <iframe id="playerIframe" allowfullscreen></iframe>
    </div>
    <div class="modal-info">
      <h3 id="modalTitle"></h3>
      <p id="modalDesc"></p>
    </div>
  </div>
</div>

<section id="feedback">
  <h2>Send Us Your Feedback</h2>
  <p>Reach out through our social media platforms</p>

  <div>
    <a href="https://x.com/yourusername" target="_blank">
      <i class="fab fa-twitter"></i>
    </a>

    <a href="https://wa.me/254716894589?text=Hello%20I%20would%20like%20to%20give%20feedback%20about%20FlixFree" target="_blank">
      <i class="fab fa-whatsapp"></i>
    </a>

    <a href="https://instagram.com/yourusername" target="_blank">
      <i class="fab fa-instagram"></i>
    </a>
  </div>
</section>

<footer>
  <hr>
  <h2>About</h2>
  <p>Offering free website for movies and series</p>
  <br>
  <h2>Contact</h2>
  <p>Telephone: 0716894589</p>
  <p>Email: wayntonkibagendi@gmail.com</p>
</footer>

<script>
const mediaLibrary = {
  trending: [
    {
      title: "The Midnight Gospel",
      year: "2020",
      type: "series",
      desc: "Animated existential journey.",
      embed: "https://player.vimeo.com/video/76979871",
      poster: "https://via.placeholder.com/1600x900/111/e50914?text=Midnight+Gospel"
    },
    {
      title: "Play Dirty",
      year: "2025",
      type: "movie",
      desc: "Crime thriller.",
      embed: "https://player.vimeo.com/video/22439234",
      poster: "https://via.placeholder.com/1600x900/111/e50914?text=Play+Dirty"
    },
    {
      title: "The Big Lebowski",
      year: "1998",
      type: "movie",
      desc: "Classic cult comedy.",
      embed: "https://player.vimeo.com/video/22439234",
      poster: "https://via.placeholder.com/1600x900/111/e50914?text=Big+Lebowski"
    }
  ],

  movies: [
    {
      title: "Sherlock Jr.",
      year: "1924",
      type: "movie",
      desc: "Buster Keaton masterpiece.",
      embed: "https://player.vimeo.com/video/1084537",
      poster: "https://via.placeholder.com/300x450/111/e50914?text=Sherlock+Jr"
    },
    {
      title: "Rush Hour",
      year: "1998",
      type: "movie",
      desc: "Action comedy classic.",
      embed: "https://player.vimeo.com/video/1084537",
      poster: "https://via.placeholder.com/300x450/111/e50914?text=Rush+Hour"
    },
    {
      title: "Kung Fury",
      year: "2015",
      type: "movie",
      desc: "Retro action film.",
      embed: "https://player.vimeo.com/video/22439234",
      poster: "https://via.placeholder.com/300x450/111/e50914?text=Kung+Fury"
    }
  ],

  series: [
    {
      title: "Pilgrim",
      year: "2021",
      type: "series",
      desc: "Indie sci-fi web series.",
      embed: "https://player.vimeo.com/video/148751763",
      poster: "https://via.placeholder.com/300x450/111/e50914?text=Pilgrim"
    },
    {
      title: "Suits",
      year: "2011",
      type: "series",
      desc: "Sharp legal drama.",
      embed: "https://player.vimeo.com/video/148751763",
      poster: "https://via.placeholder.com/300x450/111/e50914?text=Suits"
    },
    {
      title: "Into the Badlands",
      year: "2015",
      type: "series",
      desc: "Martial arts action.",
      embed: "https://player.vimeo.com/video/22439234",
      poster: "https://via.placeholder.com/300x450/111/e50914?text=Badlands"
    }
  ]
};

function renderCards(items, containerId) {
  const container = document.getElementById(containerId);
  container.innerHTML = "";

  items.forEach(item => {
    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <img src="${item.poster}">
      <div class="card-info">
        <h4>${item.title} (${item.year})</h4>
        <p>${item.type}</p>
        <div class="badge">FREE</div>
      </div>
    `;

    card.onclick = () => openModal(item);
    container.appendChild(card);
  });
}

function openModal(media) {
  document.getElementById("playerIframe").src = media.embed + "?autoplay=1";
  document.getElementById("modalTitle").innerText = media.title;
  document.getElementById("modalDesc").innerText = media.desc;
  document.getElementById("videoModal").style.display = "flex";
  document.body.style.overflow = "hidden";
}

function closeModal() {
  document.getElementById("playerIframe").src = "";
  document.getElementById("videoModal").style.display = "none";
  document.body.style.overflow = "auto";
}

const allHeroMedia = [
  ...mediaLibrary.trending,
  ...mediaLibrary.movies,
  ...mediaLibrary.series
];

let currentHeroIndex = 0;
let currentHeroMedia = allHeroMedia[0];

const bg1 = document.querySelector(".bg1");
const bg2 = document.querySelector(".bg2");
const heroTitle = document.getElementById("heroTitle");
const heroDesc = document.getElementById("heroDesc");

let showingFirst = true;

function updateHeroPoster() {
  currentHeroMedia = allHeroMedia[currentHeroIndex];

  const nextBg = showingFirst ? bg2 : bg1;
  const currentBg = showingFirst ? bg1 : bg2;

  nextBg.style.backgroundImage = `url('${currentHeroMedia.poster}')`;

  nextBg.classList.add("active");
  currentBg.classList.remove("active");

  heroTitle.innerText = currentHeroMedia.title;
  heroDesc.innerText = currentHeroMedia.desc;

  showingFirst = !showingFirst;
  currentHeroIndex = (currentHeroIndex + 1) % allHeroMedia.length;
}

function playCurrentHero() {
  openModal(currentHeroMedia);
}

renderCards(mediaLibrary.trending, "trendingSlider");
renderCards(mediaLibrary.movies, "moviesSlider");
renderCards(mediaLibrary.series, "seriesSlider");

updateHeroPoster();
setInterval(updateHeroPoster, 7000);
</script>

</body>
</html>
