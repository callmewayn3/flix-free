      {

      },
      {
        title: "Kung Fury",
        year: "2015",

        desc: "Retro action film.",
        image: "https://m.media-amazon.com/images/M/MV5BMjEzNTU0ODg4MV5BMl5BanBnXkFtZTgwNjY1NzE4NTE@._V1_.jpg",

    series: [

        embed: "https://player.vimeo.com/video/22439234"
      }
    ]
  };

  function renderCards(items, containerId) {
    const container = document.getElementById(containerId);
    container.innerHTML = "";

    items.forEach(item => {
      const card = document.createElement("div");
      card.className = "card";

      card.innerHTML = `
        <img src="${item.image}" alt="${item.title}">
        <div class="card-info">
          <h4>${item.title} (${item.year})</h4>
          <p>${item.type}</p>
          <div class="badge">FREE</div>
        </div>
      `;

      card.onclick = () => openModal(item);
      container.appendChild(card);
    });
  }

  function openModal(media) {
    document.getElementById("playerIframe").src = media.embed + "?autoplay=1";
    document.getElementById("modalTitle").innerText =
      `${media.title} (${media.year})`;
    document.getElementById("modalDesc").innerText = media.desc;
    document.getElementById("videoModal").style.display = "flex";
    document.body.style.overflow = "hidden";
  }

  function closeModal() {
    document.getElementById("playerIframe").src = "";
    document.getElementById("videoModal").style.display = "none";
    document.body.style.overflow = "auto";
  }

  function heroRandomPlay() {
    const allMedia = [
      ...mediaLibrary.trending,
      ...mediaLibrary.movies,
      ...mediaLibrary.series
    ];

    const random =
      allMedia[Math.floor(Math.random() * allMedia.length)];

    openModal(random);
  }

  renderCards(mediaLibrary.trending, "trendingSlider");
  renderCards(mediaLibrary.movies, "moviesSlider");
  renderCards(mediaLibrary.series, "seriesSlider");
</script>
